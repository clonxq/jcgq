###############жүӢеҠЁдҝ®ж”№##############
name: jcg-q30 immortalwrt 24.10 Builder

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
      include_mwan3:
        description: 'жҳҜеҗҰзј–иҜ‘ luci-app-mwan3'
        required: true
        default: false
        type: boolean
#  schedule:
#    - cron: 0 16 * * *

env:
  ###############жүӢеҠЁдҝ®ж”№##############
  OPENWRT_NAME: immortalwrt
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: im.config
  DIY_P1_SH: impart1.sh
  DIY_P2_SH: impart2.sh
  SSH_ACTIONS: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    
    permissions:
      contents: write
      
    steps:
    - name: Check Server Performance
      run: |
        echo "иӯҰе‘Ҡвҡ "
        echo "еҲҶй…Қзҡ„жңҚеҠЎеҷЁжҖ§иғҪжңүйҷҗпјҢиӢҘйҖүжӢ©зҡ„жҸ’д»¶иҝҮеӨҡпјҢеҠЎеҝ…жіЁж„ҸCPUжҖ§иғҪпјҒ"
        echo -e "е·ІзҹҘCPUеһӢеҸ·(йҷҚеәҸ): 7763пјҢ8370CпјҢ8272CLпјҢ8171MпјҢE5-2673\n"
        echo "--------------------------CPUдҝЎжҒҜ--------------------------"
        echo "CPUзү©зҗҶж•°йҮҸ: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo "CPUж ёеҝғж•°йҮҸ: $(nproc)"
        echo -e "CPUеһӢеҸ·дҝЎжҒҜ:$(cat /proc/cpuinfo | grep -m1 name | awk -F: '{print $2}')\n"
        echo "--------------------------еҶ…еӯҳдҝЎжҒҜ--------------------------"
        echo "е·Іе®үиЈ…еҶ…еӯҳиҜҰз»ҶдҝЎжҒҜ:"
        echo -e "$(sudo lshw -short -C memory | grep GiB)\n"
        echo "--------------------------зЎ¬зӣҳдҝЎжҒҜ--------------------------"
        echo "зЎ¬зӣҳж•°йҮҸ: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

    - name: Optimize Disk Space
      uses: hugoalh/disk-space-optimizer-ghaction@v0.8.1
      with:
        operate_sudo: "True"
        general_include: ".+"
        general_exclude: |-
          ^GCC$
          ^G\+\+$
          Clang
          LLVM
        docker_include: ".+"
        docker_prune: "True"
        docker_clean: "True"
        apt_prune: "True"
        apt_clean: "True"
        homebrew_prune: "True"
        homebrew_clean: "True"
        npm_prune: "True"
        npm_clean: "True"
        os_swap: "True"

    - name: After disk optimize
      run: df -H

    - name: жЈҖжҹҘйЎ№зӣ®еҲҶж”Ҝ
      uses: actions/checkout@main

    - name: еҲқе§ӢеҢ–зј–иҜ‘зҺҜеўғ
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt -yqq update
        sudo -E apt -yqq full-upgrade
        sudo -E apt -yqq autoremove --purge
        sudo -E apt -yqq autoclean
        sudo -E apt -yqq clean
        sudo -E apt -yqq install rename dos2unix python3-netifaces libfuse-dev llvm-dev libclang-dev clang
        sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo rm -rf /etc/apt/sources.list.d/* /usr/local/lib/android /opt/ghc /usr/share/dotnet /usr/local/graalvm /usr/local/.ghcup \
        /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        
        # GitHub Action з§»йҷӨеӣҪеҶ…дёӢиҪҪжәҗ
        PROJECT_MIRRORS_FILE="./scripts/projectsmirrors.json"
        if [ -f "$PROJECT_MIRRORS_FILE" ]; then
          sed -i '/.cn\//d; /tencent/d; /aliyun/d' "$PROJECT_MIRRORS_FILE"
        fi
          
    - name: еҠ иҪҪfeeds.conf.default & DIY_P1_SH
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: жӣҙж–° & е®үиЈ… feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: еҠ иҪҪconfig & DIY_P2_SH
      run: |
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        
    - name: еӨ„зҗҶ mwan3 зј–иҜ‘йҖүйЎ№
      run: |
        cd openwrt
        if [ "${{ github.event.inputs.include_mwan3 }}" == "true" ]; then
          echo "CONFIG_PACKAGE_luci-app-mwan3=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-mwan3-zh-cn=y" >> .config
          echo "е·ІеңЁ .config дёӯеҗҜз”Ё mwan3"
        else
          echo "CONFIG_PACKAGE_luci-app-mwan3=n" >> .config
          echo "и·іиҝҮзј–иҜ‘ mwan3"
        fi       
        
    - name: SSHй“ҫжҺҘз®ЎзҗҶ
      uses: P3TERX/ssh2actions@main
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    - name: ж јејҸеҢ–зј“еӯҳKeyеҸҳйҮҸ
      run: |
        # е°ҶеҲҶж”ҜеҗҚдёӯзҡ„зү№ж®Ҡеӯ—з¬ҰжӣҝжҚўдёә '-'пјҢйҳІжӯўзј“еӯҳ key е‘ҪеҗҚйқһжі•
        SAFE_BRANCH=$(echo "${{ env.REPO_BRANCH }}" | sed 's/[^a-zA-Z0-9]/_/g')
        echo "SAFE_BRANCH=$SAFE_BRANCH" >> $GITHUB_ENV

    - name: еҠ иҪҪзј–иҜ‘зј“еӯҳ
      uses: actions/cache@main
      with:
        path: |
          openwrt/.ccache
          openwrt/staging_dir/host
          openwrt/staging_dir/hostpkg
          openwrt/staging_dir/toolchain-*
        key: ${{ runner.os }}-openwrt-${{ env.SAFE_BRANCH }}-${{ hashFiles('openwrt/.config') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-${{ env.SAFE_BRANCH }}-
          
    - name: дёӢиҪҪе®үиЈ…еҢ…
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Check space usage
      if: (!cancelled())
      run: df -hT
      
    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        
        # жҸҗеҸ–и®ҫеӨҮеҗҚз§°
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=$(cat DEVICE_NAME)" >> $GITHUB_ENV
        
        # дҝ®еӨҚпјҡжӣҙзЁіеҒҘең°жҸҗеҸ–е№іеҸ°еҗҚз§° (Target Board)
        grep '^CONFIG_TARGET_BOARD' .config | cut -d'=' -f2 | tr -d '"' > TARGET_NAME
        [ -s TARGET_NAME ] && echo "TARGET_NAME=$(cat TARGET_NAME)" >> $GITHUB_ENV
        
        # жҸҗеҸ–й»ҳи®Ө IP ең°еқҖ
        sed -n 's/.*lan) ipad=${ipaddr:-"\([0-9]\+\.[0-9]\+\.[0-9]\+\.[0-9]\+\)"} ;;.*/\1/p' package/base-files/files/bin/config_generate | head -n 1 > IP_ADDR
        [ -s IP_ADDR ] && echo "IP_ADDR=$(cat IP_ADDR)" >> $GITHUB_ENV
        
        # з”ҹжҲҗж—¶й—ҙжҲі
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        
    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        # 1. еҲ йҷӨдёҚеҝ…иҰҒзҡ„зӣ®еҪ•
        rm -rf packages
        
        # 2. йҒҚеҺҶеҪ“еүҚзӣ®еҪ•дёӢжүҖжңүж–Үд»¶
        # жҺ’йҷӨе·Із»ҸеҢ…еҗ«ж—Ҙжңҹзҡ„ж–Үд»¶пјҢйҒҝе…ҚйҮҚеӨҚе‘ҪеҗҚ
        for file in $(ls *.* 2>/dev/null);
        do
          if [[ "$file" != *"${{ env.FILE_DATE }}"* ]]; then
            # жҸҗеҸ–ж–Үд»¶еҗҚдё»дҪ“
            BASE_NAME="${file%.*}"
            # жҸҗеҸ–жү©еұ•еҗҚпјҲеҢ…жӢ¬ејҖеӨҙзҡ„зӮ№пјү
            EXT=".${file##*.}"
            # йҮҚе‘ҪеҗҚпјҡеҺҹеҗҚ-ж—Ҙжңҹ.еҗҺзјҖ
            mv "$file" "${BASE_NAME}-${{ env.FILE_DATE }}${EXT}"
          fi
        done
        
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
        
    - name: з”ҹжҲҗеӣәд»¶Releaseж Үзӯҫ
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        # 1. е®ҡдҪҚе№¶и§Јжһҗ manifest ж–Үд»¶
        MANIFEST_FILE=$(find openwrt/bin/targets/ -name "*.manifest" | head -n 1)
        
        # 2. иҺ·еҸ– Git жҸҗдәӨдҝЎжҒҜ
        cd openwrt
        GIT_COMMIT_HASH=$(git rev-parse --short HEAD)
        GIT_COMMIT_URL="${{ env.REPO_URL }}/commit/$GIT_COMMIT_HASH"
        cd ..

        # 3. ејҖе§Ӣжһ„е»ә release_body.txt
        {
          echo "### зј–иҜ‘дҝЎжҒҜ"
          echo "- **жәҗз Ғпјҡ** ${{ env.REPO_URL }}"
          echo "- **еҲҶж”Ҝпјҡ** ${{ env.REPO_BRANCH }}"
          echo "- **жҸҗдәӨпјҡ** [$GIT_COMMIT_HASH]($GIT_COMMIT_URL)"
          echo "- **й…ҚзҪ®пјҡ** ${{ env.DEVICE_NAME }}"
          echo "- **е№іеҸ°пјҡ** ${{ env.TARGET_NAME }}"
          echo ""
          echo "### з®ЎзҗҶдҝЎжҒҜ"
          echo "- **зҷ»еҪ•ең°еқҖпјҡ** ${{ env.IP_ADDR || '192.168.1.1' }}"
          echo ""
        } > release_body.txt
        
        if [ -f "$MANIFEST_FILE" ]; then
          # жҸҗеҸ–еҶ…ж ёзүҲжң¬
          KVER=$(grep -oP "^kernel.*" "$MANIFEST_FILE" | head -n 1 | grep -oP "[4-6]\.[0-9]{1,3}\.[0-9]{1,3}")
          echo "- **еҶ…ж ёзүҲжң¬пјҡ** $KVER" >> release_body.txt
          
          echo "### жҸ’д»¶еҲ—иЎЁ" >> release_body.txt
          echo "\`\`\`text" >> release_body.txt
          
          # йҮҚзӮ№пјҡй’ҲеҜ№ "еҢ…еҗҚ - зүҲжң¬" ж јејҸдјҳеҢ–зҡ„жҸҗеҸ–йҖ»иҫ‘
          # 1. иҝҮж»ӨеҮә luci-app- ејҖеӨҙзҡ„иЎҢ
          # 2. з”Ё awk жҸҗеҸ–з¬¬дёҖеҲ—(еҢ…еҗҚ)е’ҢжңҖеҗҺдёҖеҲ—(зүҲжң¬еҸ·)
          # 3. з”Ё column -t е®һзҺ°зІҫзҫҺеҜ№йҪҗ
          grep "luci-app-" "$MANIFEST_FILE" | awk '{print $1 "  [" $NF "]"}' | sort -u | column -t >> release_body.txt
          
          echo "" >> release_body.txt
          echo "[ дё»йўҳ ]" >> release_body.txt
          grep "luci-theme-" "$MANIFEST_FILE" | awk '{print $1}' | sort -u >> release_body.txt
          echo "\`\`\`" >> release_body.txt
        fi

        # иҫ“еҮә Release ж ҮзӯҫеҗҚ
        echo "release_tag=k6-${{ env.DEVICE_NAME }}-${{ env.FILE_DATE }}" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT

    - name: еҸ‘еёғеӣәд»¶иҮіRelease
      uses: softprops/action-gh-release@v2.1.0
      if: steps.tag.outputs.status == 'success' && !cancelled()
      with:
        files: ${{ env.FIRMWARE }}/*
        tag_name: ${{ steps.tag.outputs.release_tag }} # е…ій”®
        name: OpenWrt-${{ env.DEVICE_NAME }}-${{ env.FILE_DATE }} # з»ҷ Release ж Үйўҳиө·дёӘеҘҪеҗ¬зҡ„еҗҚеӯ—
        body_path: release_body.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 1
        keep_minimum_runs: 2
        # жҳҫејҸжҢҮе®ҡеҸӘжё…зҗҶеҪ“еүҚиҝҷдёӘе·ҘдҪңжөҒпјҢйҳІжӯўиҜҜдјӨ
        workflow_id: ${{ github.workflow }}

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 2
        delete_tags: true
        filter_tags: "k6-*"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
