name: Cleanup All Workflows
on:
  workflow_dispatch: # 手动触发

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Delete all runs using GH CLI
      run: |
        # 获取所有工作流 ID 并强制删除其运行记录
        gh run list --limit 1000 --json databaseId -q '.[].databaseId' | xargs -I{} gh run delete {}
      env:
        # 这里建议也优先使用上面提到的 PAT (secrets.MY_TOKEN)
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
